{% if jekyll.environment == 'production' and site.adsense == "enabled" and site.adsense_data_ad_client != "ca-pub-xxxxxxxxxxxxxxxx" %}
<div class="adsense-wrap my-3">
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client={{site.adsense_data_ad_client}}"
     crossorigin="anonymous"></script>
<ins class="adsbygoogle"
    style="display:block"
    data-ad-client="{{site.adsense_data_ad_client}}"
    data-ad-slot="{{site.adsense_data_ad_slot}}"
    data-ad-format="auto"
    data-full-width-responsive="true"></ins>
<script>
     (adsbygoogle = window.adsbygoogle || []).push({});
</script>
</div>
{% endif %}
