<!DOCTYPE html>
<html>
<head>
<title>Fadal Store</title>
<meta charset="UTF-8">

<style>
body{
font-family: Arial;
background:#f2f2f2;
text-align:center;
}

.container{
background:white;
width:80%;
margin:auto;
padding:20px;
border-radius:10px;
}

h1{
color:#333;
}

.article{
display:block;
margin:8px;
padding:10px;
background:#007bff;
color:white;
text-decoration:none;
border-radius:5px;
}

.article:hover{
background:#0056b3;
}
</style>

</head>

<body>

<div class="container">

<h1>Fadal Store</h1>
<p>Online Money Articles</p>

<div id="articles"></div>

</div>

<script>

for(let i=1;i<=30;i++){
document.getElementById("articles").innerHTML += 
'<a class="article" href="Online-Money/article'+i+'.html">Article '+i+'</a>';
}

</script>

</body>
</html>
